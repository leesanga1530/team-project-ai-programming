/* 밑줄 점선 + 마우스오버 설명. children 없으면 "코드(한글)" 형태로 표시 */
function Term({k,children}){
  const g=GLOSSARY[k];
  const [hv,setHv]=useState(false);
  const label=children!==undefined?children:(g?`${k} (${g[0]})`:k);
  return<span style={{position:"relative",borderBottom:`1px dotted ${C.textMuted}`,cursor:"help",whiteSpace:"nowrap"}}
    onMouseEnter={()=>setHv(true)} onMouseLeave={()=>setHv(false)}>
    {label}
    {hv&&g&&<span style={{position:"absolute",bottom:"130%",left:"50%",transform:"translateX(-50%)",zIndex:200,width:220,padding:"8px 11px",borderRadius:8,background:C.text,color:"#fff",fontSize:11,fontWeight:400,lineHeight:1.6,boxShadow:shadow,whiteSpace:"normal",textAlign:"left"}}>
      <b>{k} = {g[0]}</b><br/>{g[1]}
    </span>}
  </span>;
}

/* ═══ UI ═══ */
function Card({children,style}){return<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"22px 20px",boxShadow:shadow,...style}}>{children}</div>;}
function STitle({children,sub}){return<div style={{marginBottom:24}}><h2 style={{color:C.text,fontSize:20,fontWeight:700,margin:0,display:"flex",alignItems:"center",gap:9}}><span style={{width:3,height:18,background:`linear-gradient(180deg,${C.amber},${C.coral})`,borderRadius:2}}/>{children}</h2>{sub&&<p style={{color:C.textDim,fontSize:13,margin:"5px 0 0 12px"}}>{sub}</p>}</div>;}
function Pill({children,color=C.amber,active,onClick}){return<button onClick={onClick} style={{padding:"5px 12px",borderRadius:18,cursor:"pointer",fontFamily:font,fontSize:12,fontWeight:600,background:active?`${color}14`:"transparent",border:`1px solid ${active?color+"44":C.border}`,color:active?color:C.textDim,transition:"all 0.15s"}}>{children}</button>;}
function Badge({children,color}){return<span style={{padding:"3px 10px",borderRadius:16,background:`${color}12`,color,fontSize:11,fontWeight:600}}>{children}</span>;}
function StatBox({label,value,unit,color=C.amber,sub}){return<Card><span style={{color:C.textDim,fontSize:12}}>{label}</span><div style={{display:"flex",alignItems:"baseline",gap:5,marginTop:3}}><span style={{color,fontSize:26,fontWeight:800,fontFamily:mono}}>{value}</span>{unit&&<span style={{color:C.textDim,fontSize:13}}>{unit}</span>}</div>{sub&&<span style={{color:C.textMuted,fontSize:11}}>{sub}</span>}</Card>;}
function ChartCard({title,sub,children,style}){return<Card style={style}><div style={{color:C.text,fontSize:14,fontWeight:700,marginBottom:sub?4:12}}>{title}</div>{sub&&<div style={{color:C.textMuted,fontSize:12,marginBottom:12}}>{sub}</div>}{children}</Card>;}
function Insight({color=C.amber,children,style}){return<div style={{padding:12,borderRadius:8,background:`${color}08`,border:`1px solid ${color}18`,fontSize:12,color:C.textDim,lineHeight:1.7,...style}}>{children}</div>;}

/* ═══ PREDICT (simplified: text only → binary 0/1) ═══ */
function Predict(){
  const [word,setWord]=useState("");
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);

  const wa=useMemo(()=>{
    if(!word) return null;
    const w=word.trim(),len=w.replace(/\s/g,"").length;
    const hangul=(w.match(/[가-힣ㄱ-ㅎㅏ-ㅣ]/g)||[]).length;
    const eng=(w.match(/[a-zA-Z]/g)||[]).length;
    const tokens=w.split(/\s+/).length;
    const hasCho=/[ㄱ-ㅎ]/.test(w);
    const hasRepeat=/(.)\1{2,}/.test(w);
    return {len,hangulRatio:len?Math.round(hangul/len*100):0,engRatio:len?Math.round(eng/len*100):0,tokens,hasCho,hasRepeat,isWord:tokens===1&&len<=10,isSent:tokens>=3,syllables:hangul};
  },[word]);

  const predict=()=>{
    if(!word.trim()) return;
    setLoading(true);
    setTimeout(()=>{
      const w=word.trim();
      // Check if word exists in real dataset
      const match=WD.find(d=>d[0]===w||d[0].includes(w)||w.includes(d[0]));
      let label,prob,features;
      if(match){
        prob=match[3];
        label=prob>=0.5?1:0;
        features=match[4]?Object.fromEntries(match[4].map(([f,v])=>[f,(v>0?"+":"")+v.toFixed(1)])):{"(빈도 데이터 없음)":"—"};
      } else {
        // Mock for unknown words
        const h=[...w].reduce((a,c)=>a+c.charCodeAt(0),0);
        const r=((h*16807)%2147483647)/2147483647;
        prob=Math.round((0.15+r*0.7)*100)/100;
        label=prob>=0.5?1:0;
        features={"hangul_ratio":wa.hangulRatio>80?"+0.3":"-0.1","syllable_count":wa.syllables<=4?"+0.2":"-0.3","is_word_like":wa.isWord?"+0.15":"-0.1","(참고 예측)":"—"};
      }
      setResult({label,prob,features,isReal:!!match});
      setLoading(false);
    },800);
  };

  return<div style={{padding:"32px 24px 80px",maxWidth:900,margin:"0 auto"}}>
    <STitle sub="유행어를 입력하면 오래 살아남을지 예측합니다 (0: 단기유행 / 1: 장기 생존)">유행어 생존 예측</STitle>

    <Card style={{marginBottom:20}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>예측할 유행어를 입력하세요</div>
      <div style={{display:"flex",gap:12}}>
        <input value={word} onChange={e=>{setWord(e.target.value);setResult(null);}} placeholder="예: 럭키비키, 갓생, 트랄랄레로..."
          onKeyDown={e=>e.key==="Enter"&&predict()}
          style={{flex:1,padding:"14px 18px",borderRadius:10,background:C.bg,border:`1px solid ${C.border}`,color:C.text,fontSize:16,fontFamily:font,outline:"none"}}
          onFocus={e=>e.target.style.borderColor=C.amber} onBlur={e=>e.target.style.borderColor=C.border}/>
        <button onClick={predict} disabled={!word.trim()||loading} style={{padding:"14px 28px",borderRadius:10,border:"none",background:!word.trim()?C.surfaceLight:`linear-gradient(135deg,${C.amber},${C.coral})`,color:!word.trim()?C.textMuted:"#fff",fontSize:14,fontWeight:700,cursor:word.trim()?"pointer":"not-allowed",fontFamily:font,whiteSpace:"nowrap"}}>
          {loading?"분석 중...":"예측하기"}
        </button>
      </div>

      {/* Auto linguistic analysis */}
      {wa&&word.trim()&&<div style={{marginTop:14,padding:14,borderRadius:10,background:C.bg,border:`1px solid ${C.border}`}}>
        <div style={{fontSize:11,color:C.textMuted,marginBottom:8}}>단어에서 자동으로 뽑은 <Term k="L" /> (65개 중 일부)</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[
            ["글자 수",wa.len],["한글 비율",wa.hangulRatio+"%"],["영어 비율",wa.engRatio+"%"],
            ["공백 단어 수",wa.tokens],["음절 수",wa.syllables],
            wa.isWord&&["단어형","✓"],wa.isSent&&["문장형","✓"],
            wa.hasCho&&["초성 포함","✓"],wa.hasRepeat&&["반복문자","✓"],
          ].filter(Boolean).map(([k,v])=>(
            <span key={k} style={{padding:"4px 10px",borderRadius:6,background:C.card,border:`1px solid ${C.border}`,fontSize:11,color:C.textDim}}>
              <b style={{color:C.amber}}>{v}</b> {k}
            </span>
          ))}
        </div>
        <div style={{fontSize:10,color:C.textMuted,marginTop:6}}>* 의미 벡터(<Term k="E" />)와 형태소 분석 결과를 함께 활용합니다</div>
      </div>}
    </Card>

    {/* Result */}
    {result&&<Card style={{border:`1px solid ${result.label===1?C.green:C.red}30`}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:20}}>
        <div style={{width:64,height:64,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,fontFamily:mono,
          background:result.label===1?C.greenBg:C.redBg,color:result.label===1?C.green:C.red,border:`2px solid ${result.label===1?C.green:C.red}33`}}>
          {result.label}
        </div>
        <div>
          <div style={{fontSize:24,fontWeight:800,color:C.text}}>"{word}"</div>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <Badge color={result.label===1?C.green:C.red}>{result.label===1?"장기 생존 예상":"단기유행 / 미유행 예상"}</Badge>
            <span style={{fontSize:12,color:C.textDim,alignSelf:"center"}}>확률: {(result.prob*100).toFixed(1)}%</span>
          </div>
        </div>
      </div>

      {/* Confidence bar */}
      <div style={{background:C.bg,borderRadius:10,padding:18,marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8}}>
          <span style={{color:C.red,fontWeight:600}}>단기유행 (0)</span>
          <span style={{color:C.textMuted}}>예측 확률</span>
          <span style={{color:C.green,fontWeight:600}}>장기생존 (1)</span>
        </div>
        <div style={{height:12,background:`linear-gradient(90deg, ${C.red}33, ${C.surfaceLight} 45%, ${C.surfaceLight} 55%, ${C.green}33)`,borderRadius:6,position:"relative"}}>
          <div style={{position:"absolute",left:`${result.prob*100}%`,top:-4,width:20,height:20,borderRadius:"50%",background:result.label===1?C.green:C.red,border:"3px solid #fff",boxShadow:shadow,transform:"translateX(-50%)"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.textMuted,marginTop:4}}><span>0%</span><span>50% (threshold)</span><span>100%</span></div>
      </div>

      {/* SHAP-like explanation */}
      <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>예측 근거 (<Term k="SHAP">SHAP · 어떤 특징이 결과를 밀었나</Term>)</div>
      <div style={{background:C.bg,borderRadius:10,padding:16}}>
        {(()=>{
          const entries=Object.entries(result.features);
          const nums=entries.map(([_,v])=>Number.isFinite(parseFloat(v))?Math.abs(parseFloat(v)):0);
          const maxAbs=Math.max(...nums,1);
          return entries.map(([name,val],i)=>{
            const num=parseFloat(val);
            const hasNum=Number.isFinite(num);
            const isPos=hasNum?num>=0:String(val).startsWith("+");
            const width=hasNum?Math.min(Math.abs(num)/maxAbs*46,46):0;
            return <div key={name} style={{display:"grid",gridTemplateColumns:"140px 1fr 52px",alignItems:"center",gap:10,marginBottom:i<entries.length-1?10:0}}>
              <span style={{color:C.textDim,fontSize:11,textAlign:"right",minWidth:0,overflow:"hidden",textOverflow:"ellipsis"}}>{name}</span>
              <div style={{height:18,position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",left:"50%",top:0,bottom:0,width:1,background:C.border}}/>
                {hasNum && (isPos
                  ? <div style={{position:"absolute",left:"50%",width:`${width}%`,height:12,top:3,borderRadius:"0 4px 4px 0",background:`${C.green}88`,marginLeft:2}}/>
                  : <div style={{position:"absolute",right:"50%",width:`${width}%`,height:12,top:3,borderRadius:"4px 0 0 4px",background:`${C.red}88`,marginRight:2}}/>)}
              </div>
              <span style={{color:hasNum?(isPos?C.green:C.red):C.textMuted,fontSize:12,fontFamily:mono,fontWeight:600,textAlign:"right"}}>{val}</span>
            </div>;
          });
        })()}
        <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:8,fontSize:10,color:C.textMuted}}><span>← 생존 확률 ↓</span><span>생존 확률 ↑ →</span></div>
      </div>

      <Insight color={result.label===1?C.green:C.red}>
        <b style={{color:result.label===1?C.green:C.red}}>{result.isReal?"데이터셋 기준 결과":"참고 예측"}:</b> {result.isReal?`이 유행어는 데이터셋(819개)에 포함된 단어입니다. 표시된 확률은 글자 정보 기반 예측값이고, 아래 근거는 사용 빈도까지 함께 본 모델 기준입니다.`:`이 유행어는 데이터셋에 없는 단어이므로 참고용 예측값을 표시합니다.`}
      </Insight>
    </Card>}
  </div>;
}

/* ═══ ANALYSIS (5 experiments) ═══ */
function Analysis(){
  const [exp,setExp]=useState("horizon");
  const [shapWord,setShapWord]=useState("럭키비키");
  const [shapSearch,setShapSearch]=useState("");
  // Build SHAP from real WD data
  const shapResults=useMemo(()=>{
    const q=shapSearch.trim().toLowerCase();
    if(!q) return WD.filter(d=>d[4]).slice(0,8);
    return WD.filter(d=>d[0].toLowerCase().includes(q)&&d[4]);
  },[shapSearch]);
  const selectedShap=WD.find(d=>d[0]===shapWord);
  const shapD=selectedShap&&selectedShap[4]?selectedShap[4]:[];
  const maxS=Math.max(...shapD.map(d=>Math.abs(d[1])),1);

  const TABS=[{id:"horizon",l:"🕐 관찰 기간"},{id:"model",l:"🏆 모델 비교"},{id:"ablation",l:"🧪 특징 빼보기"},{id:"importance",l:"📊 무엇이 중요한가"},{id:"kd",l:"🎓 지식 전달"}];

  return<div style={{padding:"32px 24px 80px",maxWidth:1100,margin:"0 auto"}}>
    <STitle sub="무엇이 유행어의 생존을 결정하는지 분석한 실험들">실험 결과</STitle>

    {/* Experiment Tabs */}
    <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:24}}>
      {TABS.map(t=><Pill key={t.id} active={exp===t.id} color={C.purple} onClick={()=>setExp(t.id)}>{t.l}</Pill>)}
    </div>

    {/* ── Horizon ── */}
    {exp==="horizon"&&<>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:20}}>

        </Insight>
      </ChartCard>
    </>}
  </div>;
}

    </div>

    <STitle sub="E+L+F baseline에 SN을 추가했을 때 horizon별 변화">2. Horizon별 완전 비교</STitle>

    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(320px,1fr))",gap:14,marginBottom:24}}>

      </ChartCard>
    </div>

          </BarChart>
        </ResponsiveContainer>

      </ChartCard>

      <ChartCard title="상위 특징 보기" sub="실험별 top feature importance">
        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:12}}>
          {impViews.map(([id,label])=><Pill key={id} active={impView===id} color={C.blue} onClick={()=>setImpView(id)}>{label}</Pill>)}
        </div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr>{["#","특징","그룹","중요도"].map(h=><th key={h} style={{padding:"7px",textAlign:"left",borderBottom:`2px solid ${C.border}`,color:C.textDim}}>{h}</th>)}</tr></thead>
          <tbody>{impRows.map(r=><tr key={`${r.horizon}-${r.feature_set}-${r.rank}`} style={{borderBottom:`1px solid ${C.border}`}}>

            <td style={{padding:"7px"}}><Badge color={r.group==="SN"?C.blue:r.group==="F"?C.coral:r.group==="E"?C.purple:C.amber}>{r.group}</Badge></td>
            <td style={{padding:"7px",fontFamily:mono,fontWeight:700}}>{r.importance.toFixed(0)}</td>
          </tr>)}</tbody>
        </table>
      </ChartCard>
    </div>

    <STitle sub="SN feature는 label 정보를 쓰기 때문에 누수 방지가 중요합니다">4. 실험 설계 체크</STitle>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:14}}>
      {[
        ["1. 먼저 split", "각 horizon마다 train/validation/test를 먼저 나눴습니다. 전체 데이터로 SN 중심점을 만들면 test label을 미리 보는 문제가 생길 수 있기 때문입니다.", C.green],
        ["2. train으로 SN 기준 생성", "생존 centroid, 미생존 centroid, KNN 생존 비율 같은 SN 기준은 train set만 사용해 만들었습니다.", C.blue],
        ["3. valid/test에는 적용만", "validation/test 단어는 train에서 만든 기준점에 비추어 거리와 이웃 점수를 계산했습니다. 그래서 비교가 더 공정합니다.", C.purple],
      ].map(([t,d,c])=><Card key={t} style={{borderTop:`3px solid ${c}`}}><div style={{fontSize:15,fontWeight:800,color:c,marginBottom:8}}>{t}</div><div style={{fontSize:13,color:C.textDim,lineHeight:1.75}}>{d}</div></Card>)}
    </div>
  </div>;
}

            {[20,40,60,80].map(v=><line key={"h"+v} x1={0} y1={v} x2={100} y2={v} stroke={C.border} strokeWidth={0.15} strokeDasharray="0.5,0.5"/>)}

            {sel!==null&&showNeighbors&&neighbors.map(n=>allData[n]&&<line key={n} x1={allData[sel][1]} y1={allData[sel][2]} x2={allData[n][1]} y2={allData[n][2]} stroke={sel===newIndex?C.blue:C.purple} strokeWidth={0.25} strokeOpacity={0.55} strokeDasharray="0.5,0.5"/>)}
            {allData.map((d,i)=><circle key={i} cx={d[1]} cy={d[2]} r={getR(d,i)/8} fill={getColor(d,i)} fillOpacity={getOpacity(d,i)} stroke={sel===i?"#fff":d[11]?C.blue:neighbors.includes(i)?C.purple:"none"} strokeWidth={sel===i?0.35:0.18} style={{cursor:"pointer",transition:"all 0.15s"}} onClick={()=>setSel(i)} onMouseEnter={()=>setHover(i)} onMouseLeave={()=>setHover(null)}/>)}
            <g transform={`translate(${MCT.sx},${MCT.sy})`}><polygon points="0,-1.2 1,-0.3 0.6,1 -0.6,1 -1,-0.3" fill={C.green} stroke="#fff" strokeWidth={0.2}/><text y={-2} textAnchor="middle" fontSize={1.8} fill={C.green} fontWeight={700}>생존 중심</text></g>
            <g transform={`translate(${MCT.nx},${MCT.ny})`}><rect x={-0.8} y={-0.8} width={1.6} height={1.6} fill={C.coral} stroke="#fff" strokeWidth={0.2} transform="rotate(45)"/><text y={-2} textAnchor="middle" fontSize={1.8} fill={C.coral} fontWeight={700}>미생존 중심</text></g>
            {hover!==null&&<g transform={`translate(${allData[hover][1]},${allData[hover][2]-3})`}>
              <rect x={-12} y={-2.5} width={24} height={5} rx={0.5} fill="rgba(255,255,255,0.95)" stroke={C.border} strokeWidth={0.1}/>
              <text textAnchor="middle" y={-0.5} fontSize={1.5} fontWeight={700} fill={C.text}>{allData[hover][0].slice(0,15)}</text>
              <text textAnchor="middle" y={1.5} fontSize={1.2} fill={allData[hover][11]?C.blue:(allData[hover][3]===1?C.green:C.coral)}>{allData[hover][11]?"신규 단어":(allData[hover][3]===1?"장기생존":"단기유행")} · 거리 {allData[hover][4]>0?"+":""}{allData[hover][4]}</text>
            </g>}
            {sel!==null&&<g transform={`translate(${allData[sel][1]},${allData[sel][2]-2})`}><text textAnchor="middle" fontSize={2} fontWeight={800} fill={C.amber} stroke="#fff" strokeWidth={0.3} paintOrder="stroke">{allData[sel][0].slice(0,12)}</text></g>}
          </svg>
          <div style={{position:"absolute",bottom:12,left:12,background:"rgba(255,255,255,0.92)",borderRadius:8,padding:"8px 12px",border:`1px solid ${C.border}`,fontSize:11}}>
            {colorMode==="label"&&<><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:C.green}}/>장기 생존 (246)</div><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:newWord?3:0}}><span style={{width:8,height:8,borderRadius:"50%",background:C.coral}}/>단기 유행 (573)</div>{newWord&&<div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:C.blue}}/>신규 단어</div>}</>}
            {colorMode==="margin"&&<><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:C.green}}/>생존 쪽에 가까움</div><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:C.amber}}/>중간</div><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:C.coral}}/>미생존 쪽에 가까움</div></>}
            {colorMode==="year"&&<><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"#2d9a5a"}}/>2025-2026</div><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"#d4890a"}}/>2023-2024</div><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"#c66a1e"}}/>2021-2022</div><div style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:8,height:8,borderRadius:"50%",background:"#7a746a"}}/>~2020</div></>}
          </div>
        </div>

        <div className="mapPanel" style={{width:320,flexShrink:0,borderRadius:14,border:`1px solid ${C.border}`,background:C.card,boxShadow:shadow,overflowY:"auto",padding:20,maxHeight:600}}>
          {selData? <>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:22,fontWeight:800,color:C.text,marginBottom:4,wordBreak:"break-all"}}>{selData[0]}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <span style={{padding:"3px 10px",borderRadius:12,background:selData[11]?"rgba(53,114,176,0.1)":selData[3]===1?"rgba(45,154,90,0.1)":"rgba(201,60,60,0.1)",color:selData[11]?C.blue:(selData[3]===1?C.green:C.coral),fontSize:11,fontWeight:600}}>{selData[11]?"신규 단어":selData[3]===1?"장기 생존":"단기유행 / 사라짐"}</span>
                <span style={{padding:"3px 10px",borderRadius:12,background:"rgba(124,92,191,0.08)",color:C.purple,fontSize:11,fontWeight:600}}>{selData[9]}년</span>
              </div>
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>의미 위치 점수</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
              {[["생존 거리 점수",selData[4]>0?"+"+selData[4]:selData[4],selData[4]>0.03?C.green:C.coral],["주변 생존 비율",Math.round(selData[5]*100)+"%",selData[5]>=0.6?C.green:selData[5]>=0.4?C.amber:C.coral],["생존 중심 유사도",selData[6],C.green],["미생존 중심 유사도",selData[7],C.coral],["주변 밀집도",selData[8],C.blue]].map(([k,v,c])=><div key={k} style={{padding:"10px",borderRadius:8,background:C.bg,border:`1px solid ${C.border}`}}><div style={{fontSize:10,color:C.textMuted}}>{k}</div><div style={{fontSize:16,fontWeight:700,color:c,fontFamily:mono}}>{v}</div></div>)}
            </div>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>의미가 가장 비슷한 유행어 5개</div>
            {neighbors.map((n)=>{const nd=MD[n]; if(!nd) return null; return <div key={n} onClick={()=>setSel(n)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,marginBottom:4,background:C.bg,cursor:"pointer",border:`1px solid ${C.border}`}}><span style={{width:8,height:8,borderRadius:"50%",background:nd[3]===1?C.green:C.coral,flexShrink:0}}/><span style={{flex:1,fontSize:13,color:C.text,fontWeight:500}}>{nd[0].slice(0,20)}</span><span style={{fontSize:10,color:C.textMuted}}>{nd[9]}년</span><span style={{fontSize:11,color:nd[3]===1?C.green:C.coral,fontWeight:600}}>{nd[3]===1?"생존":"미생존"}</span></div>;})}
          </> : <div style={{textAlign:"center",paddingTop:40}}><div style={{fontSize:32,marginBottom:12}}>🔍</div><div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:8}}>유행어를 선택해 보세요</div><div style={{fontSize:13,color:C.textDim,lineHeight:1.6}}>지도에서 점을 클릭하거나<br/>검색창에 유행어를 입력하세요</div></div>}
        </div>
      </div>
    </div>
  </div>;
}

/* ═══ APP ═══ */
function App(){
  const [page,setPage]=useState("home");
  useEffect(()=>{const l=document.createElement("link");l.href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css";l.rel="stylesheet";document.head.appendChild(l);},[]);
  const go=p=>{setPage(p);window.scrollTo({top:0,behavior:"smooth"});};
  const NAV=[{id:"home",l:"홈",i:"🏠"},{id:"predict",l:"생존 예측",i:"🔮"},{id:"map",l:"의미 지도",i:"🗺️"},{id:"analysis",l:"실험 결과",i:"📊"},{id:"sn",l:"특징 조합",i:"🧭"},{id:"data",l:"데이터",i:"📈"}];
  return<div style={{fontFamily:font,background:C.bg,color:C.text,minHeight:"100vh"}}>
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:100,padding:"0 20px",height:50,background:`${C.bg}ee`,backdropFilter:"blur(12px)",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}} onClick={()=>go("home")}>
        <span style={{fontSize:17,fontWeight:800,background:`linear-gradient(135deg,${C.amber},${C.coral})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>FL</span>
        <span style={{color:C.textDim,fontSize:12}}>유행어 생존 예측</span>
      </div>
      <div style={{display:"flex",gap:2}}>{NAV.map(n=><button key={n.id} onClick={()=>go(n.id)} style={{padding:"5px 10px",borderRadius:7,cursor:"pointer",border:"none",fontFamily:font,fontSize:12,fontWeight:page===n.id?700:500,background:page===n.id?C.amberBg:"transparent",color:page===n.id?C.amber:C.textDim,display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:12}}>{n.i}</span><span className="nl">{n.l}</span></button>)}</div>
    </nav>
    <div style={{paddingTop:50}}>
      {page==="home"&&<Home go={go}/>}
      {page==="predict"&&<Predict/>}
      {page==="map"&&<SemanticMap/>}
      {page==="analysis"&&<Analysis/>}
      {page==="sn"&&<SNExperiment/>}
      {page==="data"&&<Data/>}
    </div>
    <footer style={{textAlign:"center",padding:"24px 20px",borderTop:`1px solid ${C.border}`,color:C.textMuted,fontSize:11}}>© 2025 FL Team — 유행어 생존 예측 프로젝트 · 손정훈 · 이상아 · 이재준</footer>
    <style>{`@media(max-width:600px){.nl{display:none;}}@media(max-width:760px){.mapRow{flex-direction:column!important;}.mapPanel{width:auto!important;max-height:none!important;}}`}</style>
  </div>;
}


createRoot(document.getElementById('root')).render(<App />);

    </script>
  </body>
</html>
